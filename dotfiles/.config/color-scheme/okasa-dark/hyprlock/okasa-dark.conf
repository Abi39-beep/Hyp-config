# Okasa Dark / Everforest-style Hyprlock colors

$bg0    = rgb(0f1117)
$bg1    = rgb(151821)
$bg2    = rgb(1a1f2b)
$bg3    = rgb(232a3a)
$bg4    = rgb(2a3244)

$red    = rgb(f38ba8)
$orange = rgb(fab387)
$yellow = rgb(f9e2af)
$green  = rgb(a6e3a1)
$aqua   = rgb(94e2d5)
$blue   = rgb(89b4fa)
$purple = rgb(cba6f7)

$fg     = rgb(cdd6f4)

$grey0  = rgb(45475a)
$grey1  = rgb(585b70)
$grey2  = rgb(6c7086)

# alpha variants (no rgb(), hex only)
$fgAlpha     = cdd6f4
$purpleAlpha = cba6f7


# Background
background {
    monitor =
    color = $bg0
}


# Time label
label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $fg
    font_size = 80
    position = 0, 200
    halign = center
    valign = center
}


# Date label
label {
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $blue
    font_size = 22
    position = 0, 120
    halign = center
    valign = center
}


# Input field
input-field {
    size = 250, 50

    outer_color = $bg3
    inner_color = $bg1
    font_color = $fg

    placeholder_text = Password...
    fade_on_empty = false

    position = 0, -50
    halign = center
    valign = center
}


# Ring color states
input-field:focus {
    outer_color = $blue
}

input-field:error {
    outer_color = $red
}
